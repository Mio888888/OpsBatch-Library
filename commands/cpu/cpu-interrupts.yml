name: 查看 CPU 中断热点
command: |
  if [ "$(uname -s)" = "Linux" ] && [ -r /proc/interrupts ]; then
    echo "== Top interrupt lines by accumulated count =="
    awk '
      NR == 1 { print; next }
      /^[[:space:]]*[0-9]+:/ {
        total = 0
        for (i = 2; i <= NF; i++) {
          if ($i ~ /^[0-9]+$/) total += $i
        }
        print total, $0
      }
    ' /proc/interrupts | sort -nr | head -20
  elif [ "$(uname -s)" = "Darwin" ]; then
    echo "macOS does not expose /proc/interrupts. Showing CPU and load summary instead."
    top -l 1 | head -20
  else
    echo "No supported CPU interrupt command found."
  fi
category: cpu
tags:
  - troubleshooting
  - cpu
  - interrupt
risk: low
description: 查看 Linux 中断计数最高的中断源，辅助定位网卡、磁盘或硬件中断导致的 CPU 消耗。macOS 给出平台限制说明。
platform:
  - linux
  - macos
