name: 查看调度与上下文切换
command: |
  if command -v vmstat >/dev/null 2>&1; then
    vmstat 1 5
    echo "Hint: cs 表示上下文切换，in 表示中断，r 表示运行队列。"
  elif [ "$(uname -s)" = "Linux" ] && [ -r /proc/stat ]; then
    grep -E '^(ctxt|processes|procs_running|procs_blocked)' /proc/stat
  elif [ "$(uname -s)" = "Darwin" ] && command -v iostat >/dev/null 2>&1; then
    iostat -w 1 -c 5
    echo "macOS iostat 可辅助观察系统吞吐；详细调度指标通常需要更专业工具。"
  else
    echo "No supported scheduler/context-switch command found."
  fi
category: cpu
tags:
  - troubleshooting
  - cpu
  - scheduler
  - context-switch
risk: low
description: 查看运行队列、中断和上下文切换指标，用于判断 CPU 忙是否来自调度抖动或频繁切换。
platform:
  - linux
  - macos
