name: 查看 CPU 负载压力
command: |
  echo "== Load average =="
  uptime

  cpu_count=""
  if command -v nproc >/dev/null 2>&1; then
    cpu_count=$(nproc 2>/dev/null || true)
  elif command -v sysctl >/dev/null 2>&1; then
    cpu_count=$(sysctl -n hw.logicalcpu 2>/dev/null || true)
  elif command -v getconf >/dev/null 2>&1; then
    cpu_count=$(getconf _NPROCESSORS_ONLN 2>/dev/null || true)
  fi

  if [ -n "$cpu_count" ]; then
    echo "Logical CPU count: $cpu_count"
    echo "Hint: load average 持续高于逻辑 CPU 数通常表示 CPU 或不可中断等待存在压力。"
  fi

  if command -v vmstat >/dev/null 2>&1; then
    echo
    echo "== vmstat 1 5 =="
    vmstat 1 5
  elif [ "$(uname -s)" = "Darwin" ] && command -v top >/dev/null 2>&1; then
    echo
    echo "== top snapshot =="
    top -l 1 | head -20
  else
    echo "vmstat/top not available; only load average was shown."
  fi
category: cpu
tags:
  - inspection
  - cpu
  - load
  - pressure
risk: low
description: 查看系统 load average、逻辑 CPU 数与运行队列/阻塞队列快照，用于判断 CPU 压力是否持续存在。
platform:
  - linux
  - macos
