name: View Cron Timer Logs
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/log/cron-timer-logs_en.sh
category: log
tags:
- log
- cron
- timer
- troubleshooting
risk: medium
description: Collects diagnostic information for log inspection and maintenance diagnostics
  with the view cron timer logs workflow. Review the output because it may be noisy
  or expose operational details.
platform:
- linux
- macos
parameters:
- name: LINES
  description: Number of lines to display.
  required: false
  default: 120
- name: CRON_PATTERN
  description: Cron pattern value.
  required: false
  default: cron|crond|CRON|systemd.*timer|Started.*timer|Finished.*timer
