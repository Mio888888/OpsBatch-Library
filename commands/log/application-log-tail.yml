name: 查看指定应用日志文件
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/log/application-log-tail.sh
category: log
tags:
- log
- application
- tail
- troubleshooting
risk: medium
description: 查看显式指定应用日志文件的最后若干行。必须设置 LOG_FILE，默认只读取 120 行；日志可能包含业务数据、用户标识或请求上下文。
platform:
- linux
- macos
parameters:
- name: LOG_FILE
  description: 日志文件路径
  required: true
  default:
- name: LINES
  description: 显示行数
  required: false
  default: '120'
