name: 按服务查看日志
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/log/service-log-tail.sh
category: log
tags:
- log
- service
- troubleshooting
- journal
risk: medium
description: 按单个服务或进程名称查看近期日志。默认服务名为 ssh，可通过 SERVICE_NAME、SINCE、LINES 覆盖；日志可能包含用户、路径和业务上下文。
platform:
- linux
- macos
parameters:
- name: SERVICE_NAME
  description: 服务名称
  required: false
  default: ssh
- name: SINCE
  description: 起始时间
  required: false
  default: 2 hours ago
- name: LINES
  description: 显示行数
  required: false
  default: 120
