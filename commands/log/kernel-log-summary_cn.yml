name: 查看内核日志摘要
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/log/kernel-log-summary_cn.sh
category: log
tags:
- log
- kernel
- troubleshooting
- error
risk: medium
description: 汇总近期内核日志中的错误、告警、panic、OOM、超时等线索。只读查询，可能受系统权限限制并输出硬件、进程或路径信息。
platform:
- linux
- macos
parameters:
- name: LINES
  description: 显示行数
  required: false
  default: 120
- name: KERNEL_LOG_PATTERN
  description: 内核日志搜索模式
  required: false
  default: error|fail|warn|panic|segfault|oom|blocked|hung|reset|timeout
