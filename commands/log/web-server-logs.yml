name: 查看 Web 服务日志
command: |
  LINES="${LINES:-120}"

  echo "== common web server logs =="
  found="false"
  for file in \
    /var/log/nginx/error.log \
    /var/log/nginx/access.log \
    /var/log/apache2/error.log \
    /var/log/apache2/access.log \
    /var/log/httpd/error_log \
    /var/log/httpd/access_log; do
    if [ -f "$file" ]; then
      found="true"
      echo
      echo "-- $file --"
      tail -n "$LINES" "$file" 2>/dev/null || echo "Cannot read $file; check permissions."
    fi
  done

  if [ "$found" != "true" ]; then
    echo "No common Nginx/Apache log file found. Set LOG_FILE and use the application-log-tail command for custom paths."
  fi
category: log
tags:
- log
- web
- nginx
- apache
risk: medium
description: 查看常见 Nginx 和 Apache access/error 日志文件的最近内容。只读查询，可能输出 URL、IP、User-Agent、请求参数等敏感信息。
platform:
- linux
parameters:
- name: LINES
  description: 显示行数
  required: false
  default: "120"
