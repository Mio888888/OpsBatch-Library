name: 查看最近系统日志
command: |
  if command -v journalctl >/dev/null 2>&1; then
    journalctl -n 100 --no-pager
  elif [ -f /var/log/system.log ]; then
    tail -n 100 /var/log/system.log
  else
    echo "No supported system log source found."
  fi
category: log
tags:
  - log
  - troubleshooting
  - system
risk: low
description: 查看最近 100 行系统日志。Linux 优先使用 journalctl，macOS 尝试读取 /var/log/system.log。
platform:
  - linux
  - macos
