name: 查看容器日志
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/log/container-logs-tail.sh
category: log
tags:
- log
- container
- docker
- podman
risk: medium
description: 查看单个 Docker 或 Podman 容器的近期日志。必须设置 CONTAINER_NAME，默认限制最近 2 小时和 120 行；容器日志可能包含敏感业务数据。
platform:
- linux
- macos
parameters:
- name: CONTAINER_NAME
  description: 容器名称
  required: true
  default: ''
- name: LINES
  description: 显示行数
  required: false
  default: '120'
- name: SINCE
  description: 起始时间
  required: false
  default: 2h
