name: 受保护执行 logrotate
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/log/protected-logrotate-run.sh
category: log
tags:
- remediation
- log
- logrotate
- rotation
risk: high
description: 受保护执行 logrotate 示例。默认只运行 logrotate -d dry-run；只有同时显式设置 LOGROTATE_CONFIG
  和 CONFIRM_ROTATE=RUN_LOGROTATE 后才按指定配置执行真实轮转。误用可能移动、压缩、删除日志或触发 postrotate 脚本，执行前必须审查配置、维护窗口和业务影响。
platform:
- linux
parameters:
- name: LOGROTATE_CONFIG
  description: logrotate 配置文件路径
  required: false
  default: /etc/logrotate.conf
- name: LOGROTATE_STATE
  description: logrotate 状态文件路径
  required: true
  default:
- name: CONFIRM_ROTATE
  description: 确认轮转令牌
  required: false
  default:
