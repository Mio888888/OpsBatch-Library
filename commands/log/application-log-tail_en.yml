name: Application Log Tail
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/log/application-log-tail_en.sh
category: log
tags:
- log
- application
- tail
- troubleshooting
risk: medium
description: Collects diagnostic information for log inspection and maintenance diagnostics
  with the application log tail workflow. Review the output because it may be noisy
  or expose operational details.
platform:
- linux
- macos
parameters:
- name: LOG_FILE
  description: Log file path.
  required: true
  default: null
- name: LINES
  description: Number of lines to display.
  required: false
  default: 120
