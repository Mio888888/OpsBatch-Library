name: 查找日志增长和大文件候选
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/log/log-growth-candidates.sh
category: log
tags:
- log
- capacity
- growth
- cleanup
risk: medium
description: 查看日志目录容量、一级子目录占用和超过阈值的大日志候选。默认检查 /var/log 且只读；扫描目录可能产生额外 I/O。
platform:
- linux
- macos
parameters:
- name: TARGET_LOG_DIR
  description: 目标日志目录路径
  required: false
  default: /var/log
- name: MIN_SIZE
  description: 最小文件大小
  required: false
  default: 50M
- name: MAX_DEPTH
  description: 最大递归深度
  required: false
  default: '3'
