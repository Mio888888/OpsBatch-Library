name: 受保护压缩旧日志
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/log/protected-log-compress.sh
category: log
tags:
- remediation
- log
- compress
- cleanup
risk: high
description: 受保护压缩旧日志示例。默认只列出已轮转日志候选；只有显式设置 TARGET_LOG_DIR 和 CONFIRM_COMPRESS=COMPRESS_OLD_LOGS
  后才 gzip 匹配文件。误用可能影响仍被进程写入的日志、审计保留和排障取证，执行前必须确认备份、保留策略和业务影响。
platform:
- linux
- macos
parameters:
- name: TARGET_LOG_DIR
  description: 目标日志目录路径
  required: true
  default: ''
- name: OLDER_THAN_DAYS
  description: 超过指定天数
  required: false
  default: '7'
- name: CONFIRM_COMPRESS
  description: 确认压缩令牌
  required: false
  default: ''
