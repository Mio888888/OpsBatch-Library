name: 查看 logrotate 状态和配置
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/log/logrotate-status.sh
category: log
tags:
- log
- logrotate
- rotation
- inspection
risk: low
description: 只读查看 logrotate 可用性、主配置、配置目录和状态文件摘要。不会执行轮转，适用于排查日志轮转配置是否存在。
platform:
- linux
parameters:
- name: LOGROTATE_CONFIG
  description: logrotate 配置文件路径
  required: false
  default: /etc/logrotate.conf
- name: LOGROTATE_STATE
  description: logrotate 状态文件路径
  required: false
  default: /var/lib/logrotate/status
