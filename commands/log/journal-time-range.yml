name: 按时间范围查询日志
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/log/journal-time-range.sh
category: log
tags:
- log
- time-range
- journal
- troubleshooting
risk: medium
description: 按 SINCE/UNTIL 时间范围查询系统日志，可选 LOG_PATTERN 过滤。默认限制输出 200 行；日志可能包含主机、用户、路径和业务上下文。
platform:
- linux
- macos
parameters:
- name: SINCE
  description: 起始时间
  required: false
  default: 1 hour ago
- name: UNTIL
  description: 结束时间
  required: false
  default: now
- name: LINES
  description: 显示行数
  required: false
  default: '200'
- name: LOG_PATTERN
  description: 日志搜索模式（支持正则）
  required: true
  default: ''
