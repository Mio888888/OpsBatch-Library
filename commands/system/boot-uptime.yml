name: 查看启动时间与运行时长
command: |
  echo "Uptime:"
  uptime
  echo "Boot time:"
  if command -v who >/dev/null 2>&1; then
    who -b 2>/dev/null || true
  fi
  if command -v sysctl >/dev/null 2>&1; then
    sysctl kern.boottime 2>/dev/null || true
  fi
category: system
tags:
  - inspection
  - system
  - uptime
  - boot
risk: low
description: 查看系统运行时长和启动时间。Linux 尝试 who -b，macOS 尝试 sysctl kern.boottime。
platform:
  - linux
  - macos
