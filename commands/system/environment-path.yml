name: 查看环境变量与 PATH
command: |
  echo "PATH entries:"
  printf '%s\n' "$PATH" | tr ':' '\n'
  echo "Selected environment variables:"
  env | sort | grep -E '^(SHELL|USER|HOME|LANG|LC_|TERM|PATH|PWD)=' || true
category: system
tags:
  - inspection
  - system
  - environment
  - path
risk: low
description: 查看 PATH 条目和常见环境变量，辅助排查命令找不到、语言环境或终端环境问题。
platform:
  - linux
  - macos
