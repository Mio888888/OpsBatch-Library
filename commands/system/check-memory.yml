name: 检查内存使用
command: |
  if command -v free >/dev/null 2>&1; then
    free -h
  elif command -v vm_stat >/dev/null 2>&1; then
    vm_stat
  else
    echo "No supported memory inspection command found."
  fi
category: system
tags:
  - inspection
  - system
  - memory
risk: low
description: 查看系统内存使用情况。Linux 优先使用 free，macOS 使用 vm_stat。
platform:
  - linux
  - macos
