name: 查看资源限制
command: |
  echo "Shell resource limits:"
  ulimit -a
  if [ -r /proc/self/limits ]; then
    echo "Process limits from /proc/self/limits:"
    cat /proc/self/limits
  fi
category: system
tags:
  - inspection
  - system
  - limits
risk: low
description: 查看当前 shell 和进程资源限制，例如最大打开文件数、最大进程数等。
platform:
  - linux
  - macos
