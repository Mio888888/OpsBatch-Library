name: 查看磁盘 I/O 进程排行
command: |
  if [ "$(uname -s)" = "Linux" ]; then
    if command -v iotop >/dev/null 2>&1; then
      sudo iotop -b -n 3 -o 2>/dev/null || iotop -b -n 3 -o 2>/dev/null || true
    elif command -v pidstat >/dev/null 2>&1; then
      pidstat -d 1 3
    else
      echo "Neither iotop nor pidstat is installed. Install iotop or sysstat for per-process I/O details."
    fi
  elif [ "$(uname -s)" = "Darwin" ]; then
    if command -v fs_usage >/dev/null 2>&1; then
      echo "fs_usage usually requires sudo; sampling for 5 seconds."
      sudo fs_usage -w -f filesys 2>/dev/null | head -80 || true
    else
      echo "fs_usage not available."
    fi
  else
    echo "No supported per-process disk I/O command found."
  fi
category: disk
tags:
  - troubleshooting
  - disk
  - io
  - process
risk: medium
description: 查看正在产生磁盘 I/O 的进程。Linux 使用 iotop 或 pidstat，macOS 使用 fs_usage 短采样。命令只读，但可能需要 sudo 且采样输出较多。
platform:
  - linux
  - macos
