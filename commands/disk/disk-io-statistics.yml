name: 查看磁盘 I/O 统计
command: |
  if [ "$(uname -s)" = "Linux" ]; then
    if command -v iostat >/dev/null 2>&1; then
      iostat -xz 1 3
    else
      echo "iostat not installed. Install sysstat to collect per-device I/O statistics."
      echo
      echo "== /proc/diskstats snapshot =="
      cat /proc/diskstats 2>/dev/null || true
    fi
  elif [ "$(uname -s)" = "Darwin" ]; then
    if command -v iostat >/dev/null 2>&1; then
      iostat -d -w 1 -c 3
    else
      echo "iostat not available."
    fi
  else
    echo "No supported disk I/O statistics command found."
  fi
category: disk
tags:
  - troubleshooting
  - disk
  - io
  - performance
risk: medium
description: 连续采样磁盘 I/O 指标，Linux 优先显示 await、util、队列等扩展统计，macOS 显示磁盘吞吐采样。命令只读，但包含短时采样并可能产生额外输出。
platform:
  - linux
  - macos
