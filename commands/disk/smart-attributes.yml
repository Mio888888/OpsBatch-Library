name: 查看 SMART 详细属性
command: |
  TARGET_DEVICE="${TARGET_DEVICE:-}"
  if [ -z "$TARGET_DEVICE" ]; then
    echo "Set TARGET_DEVICE before running, for example /dev/sda."
    exit 0
  fi

  if command -v smartctl >/dev/null 2>&1; then
    sudo smartctl -A "$TARGET_DEVICE" 2>/dev/null || smartctl -A "$TARGET_DEVICE" 2>/dev/null || true
  else
    echo "smartctl not installed. Install smartmontools to view SMART attributes."
  fi
category: disk
tags:
- inspection
- disk
- smart
- health
risk: low
description: 查看指定磁盘 SMART 详细属性，如重映射扇区、温度、通电时间和错误计数。需先设置 TARGET_DEVICE；命令只读不修改磁盘状态。
platform:
- linux
- macos
parameters:
- name: TARGET_DEVICE
  description: 目标设备路径（如 /dev/sda）
  required: true
  default: ""
