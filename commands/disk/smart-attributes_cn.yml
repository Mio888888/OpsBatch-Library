name: 查看 SMART 详细属性
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/disk/smart-attributes_cn.sh
category: 磁盘
tags:
- 巡检
- 磁盘
- SMART
- 健康
risk: low
description: 查看指定磁盘 SMART 详细属性，如重映射扇区、温度、通电时间和错误计数。需先设置 TARGET_DEVICE；命令只读不修改磁盘状态。
platform:
- linux
- macos
parameters:
- name: TARGET_DEVICE
  description: 目标设备路径（如 /dev/sda）
  required: true
  default: null
