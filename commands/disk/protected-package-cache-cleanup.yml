name: 受保护清理包管理器缓存
command: |
  CONFIRM_CLEAN="${CONFIRM_CLEAN:-}"

  if [ "$CONFIRM_CLEAN" != "CLEAN_PACKAGE_CACHE" ]; then
    echo "Dry-run only. Set CONFIRM_CLEAN=CLEAN_PACKAGE_CACHE after reviewing package manager cache impact."
    echo "Detected cache locations:"
    [ -d /var/cache/apt ] && du -sh /var/cache/apt /var/lib/apt/lists 2>/dev/null || true
    [ -d /var/cache/dnf ] && du -sh /var/cache/dnf 2>/dev/null || true
    [ -d /var/cache/yum ] && du -sh /var/cache/yum 2>/dev/null || true
    [ -d /var/cache/pacman/pkg ] && du -sh /var/cache/pacman/pkg 2>/dev/null || true
    command -v brew >/dev/null 2>&1 && brew --cache 2>/dev/null | while read -r cache_dir; do du -sh "$cache_dir" 2>/dev/null; done
    exit 0
  fi

  if command -v apt-get >/dev/null 2>&1; then
    sudo apt-get clean
  elif command -v dnf >/dev/null 2>&1; then
    sudo dnf clean all
  elif command -v yum >/dev/null 2>&1; then
    sudo yum clean all
  elif command -v pacman >/dev/null 2>&1; then
    sudo pacman -Sc
  elif command -v brew >/dev/null 2>&1; then
    brew cleanup -s
  else
    echo "No supported package manager cache cleanup command found."
  fi
category: disk
tags:
  - remediation
  - disk
  - package-cache
  - cleanup
risk: high
description: 受保护的包管理器缓存清理示例。默认只展示缓存占用；只有设置 CONFIRM_CLEAN=CLEAN_PACKAGE_CACHE 后才执行清理。可能影响离线回滚、包缓存复用或需要重新下载软件包，执行前需确认维护窗口和网络可用性。
platform:
  - linux
  - macos
