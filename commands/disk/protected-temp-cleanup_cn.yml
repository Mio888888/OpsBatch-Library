name: 受保护清理临时目录候选
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/disk/protected-temp-cleanup_cn.sh
category: 磁盘
tags:
- 修复
- 磁盘
- 清理
- 临时文件
risk: high
description: 受保护的临时目录清理示例。默认只 dry-run 展示候选；只有显式设置 TARGET_DIR 和 CONFIRM_DELETE=DELETE_TEMP_CANDIDATES
  后才逐项交互删除。误用可能删除仍被业务使用的文件，执行前必须确认路径、备份和影响范围。
platform:
- linux
- macos
parameters:
- name: TARGET_DIR
  description: 目标目录路径
  required: true
  default: null
- name: OLDER_THAN_DAYS
  description: 超过指定天数
  required: false
  default: 7
- name: CONFIRM_DELETE
  description: 确认删除令牌
  required: false
  default: null
