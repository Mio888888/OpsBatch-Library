name: Protected Temp Cleanup
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/disk/protected-temp-cleanup_en.sh
category: disk
tags:
- remediation
- disk
- cleanup
- temp
risk: high
description: Runs the protected protected temp cleanup workflow for disk, filesystem,
  and storage inspection. It requires explicit intent or confirmation before making
  state-changing changes.
platform:
- linux
- macos
parameters:
- name: TARGET_DIR
  description: Target dir value.
  required: true
  default: null
- name: OLDER_THAN_DAYS
  description: Older than days value.
  required: false
  default: 7
- name: CONFIRM_DELETE
  description: Confirm delete value.
  required: false
  default: null
