name: 查找大文件候选
command: |
  TARGET_DIR="${TARGET_DIR:-.}"
  MIN_SIZE="${MIN_SIZE:-500M}"

  echo "== large files under $TARGET_DIR larger than $MIN_SIZE =="
  if [ -d "$TARGET_DIR" ]; then
    find "$TARGET_DIR" -xdev -type f -size +"$MIN_SIZE" -print0 2>/dev/null \
      | xargs -0 ls -lh 2>/dev/null \
      | sort -k5 -hr \
      | head -50
  else
    echo "TARGET_DIR is not a directory: $TARGET_DIR"
    echo "Usage: TARGET_DIR=/var MIN_SIZE=1G sh -c '<this command>'"
  fi
category: disk
tags:
  - troubleshooting
  - disk
  - capacity
  - large-files
risk: medium
description: 查找指定目录下超过阈值的大文件候选，默认当前目录、阈值 500M、不跨文件系统。只展示候选不删除文件，但扫描大目录可能较耗时。
platform:
  - linux
  - macos
