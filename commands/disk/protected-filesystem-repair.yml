name: 受保护修复文件系统
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/disk/protected-filesystem-repair.sh
category: disk
tags:
- remediation
- disk
- filesystem
- fsck
risk: high
description: 受保护的文件系统修复示例。默认只预览；只有显式设置 TARGET_DEVICE 和 CONFIRM_FSCK=REPAIR_FILESYSTEM
  后才执行交互式修复。修复可能导致数据丢失或业务中断，必须提前备份、确认设备、卸载文件系统并安排维护窗口。
platform:
- linux
- macos
parameters:
- name: TARGET_DEVICE
  description: 目标设备路径（如 /dev/sda）
  required: true
  default: ''
- name: CONFIRM_FSCK
  description: 确认文件系统检查令牌
  required: false
  default: ''
