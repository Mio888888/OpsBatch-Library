name: 查找临时目录清理候选
command: |
  TARGET_DIR="${TARGET_DIR:-/tmp}"
  OLDER_THAN_DAYS="${OLDER_THAN_DAYS:-7}"

  echo "== cleanup candidates in $TARGET_DIR older than $OLDER_THAN_DAYS days =="
  if [ -d "$TARGET_DIR" ]; then
    find "$TARGET_DIR" -xdev -mindepth 1 -mtime +"$OLDER_THAN_DAYS" -maxdepth 2 -print 2>/dev/null | head -100
    echo
    echo "This command only lists candidates and does not delete anything. Review owners and active processes before cleanup."
  else
    echo "TARGET_DIR is not a directory: $TARGET_DIR"
  fi
category: disk
tags:
- troubleshooting
- disk
- cleanup
- temp
risk: medium
description: 查找临时目录中超过指定天数未修改的清理候选，默认检查 /tmp 且只列出不删除。扫描和候选判断可能不适合所有业务目录，清理前需人工确认。
platform:
- linux
- macos
parameters:
- name: TARGET_DIR
  description: 目标目录路径
  required: false
  default: /tmp
- name: OLDER_THAN_DAYS
  description: 超过指定天数
  required: false
  default: "7"
