name: 查找重复文件候选
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/disk/duplicate-file-candidates_cn.sh
category: disk
tags:
- troubleshooting
- disk
- cleanup
- duplicate-files
risk: medium
description: 通过哈希查找指定目录下超过阈值的重复文件候选，默认当前目录、阈值 10M、不跨文件系统。只展示候选不删除文件；计算哈希可能产生较多磁盘 I/O。
platform:
- linux
- macos
parameters:
- name: TARGET_DIR
  description: 目标目录路径
  required: false
  default: .
- name: MIN_SIZE
  description: 最小文件大小
  required: false
  default: 10M
