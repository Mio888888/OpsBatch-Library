name: 受保护卸载挂载点
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/disk/protected-unmount_cn.sh
category: 磁盘
tags:
- 修复
- 磁盘
- 挂载
- 卸载挂载
risk: high
description: 受保护的卸载挂载点示例。默认只查看占用进程；只有设置 TARGET_MOUNT 和 CONFIRM_UMOUNT=UNMOUNT_TARGET
  后才卸载。卸载会中断依赖该挂载点的业务，执行前必须确认进程、路径和维护窗口。
platform:
- linux
- macos
parameters:
- name: TARGET_MOUNT
  description: 目标挂载点路径
  required: true
  default: null
- name: CONFIRM_UMOUNT
  description: 确认卸载令牌
  required: false
  default: null
