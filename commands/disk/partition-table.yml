name: 查看分区表详情
command: |
  if [ "$(uname -s)" = "Linux" ]; then
    if command -v parted >/dev/null 2>&1; then
      sudo parted -l 2>/dev/null || parted -l 2>/dev/null || true
    elif command -v fdisk >/dev/null 2>&1; then
      sudo fdisk -l 2>/dev/null || fdisk -l 2>/dev/null || true
    else
      echo "Neither parted nor fdisk is installed."
    fi
  elif [ "$(uname -s)" = "Darwin" ]; then
    diskutil list 2>/dev/null || true
  else
    echo "No supported partition table command found."
  fi
category: disk
tags:
  - inspection
  - disk
  - partition
  - inventory
risk: low
description: 查看系统分区表详情，用于确认磁盘容量、分区布局和设备命名。部分 Linux 环境读取完整分区表需要 sudo；命令只读不修改分区。
platform:
  - linux
  - macos
