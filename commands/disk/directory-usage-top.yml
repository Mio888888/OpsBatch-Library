name: 查看目录占用排行
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/disk/directory-usage-top.sh
category: disk
tags:
- troubleshooting
- disk
- capacity
- directory
risk: medium
description: 统计指定目录的磁盘占用排行，默认检查当前目录且不跨文件系统。扫描大目录可能较慢并产生较多 I/O，但只读不修改系统状态。
platform:
- linux
- macos
parameters:
- name: TARGET_DIR
  description: 目标目录路径
  required: false
  default: .
- name: DEPTH
  description: 目录扫描深度
  required: false
  default: '1'
