name: 查找大文件候选
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/disk/large-files_cn.sh
category: 磁盘
tags:
- 故障排查
- 磁盘
- 容量
- 大文件
risk: medium
description: 查找指定目录下超过阈值的大文件候选，默认当前目录、阈值 500M、不跨文件系统。只展示候选不删除文件，但扫描大目录可能较耗时。
platform:
- linux
- macos
parameters:
- name: TARGET_DIR
  description: 目标目录路径
  required: false
  default: .
- name: MIN_SIZE
  description: 最小文件大小
  required: false
  default: 500M
