name: 受保护调整文件权限
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/protected-file-permission-fix.sh
category: security
tags:
- remediation
- security
- file
- permission
risk: high
description: 受保护的文件/目录权限调整模板。默认只展示计划；只有设置 TARGET_PATH、TARGET_MODE 和 CONFIRM_CHMOD=APPLY_TARGET_MODE
  后才执行 chmod。误用可能导致服务不可读写或权限过宽，执行前必须确认影响和回滚方案。
platform:
- linux
- macos
parameters:
- name: TARGET_PATH
  description: 目标文件或目录路径
  required: true
  default:
- name: TARGET_MODE
  description: 目标权限模式（如 0644）
  required: true
  default:
- name: CONFIRM_CHMOD
  description: 确认修改权限令牌
  required: false
  default:
