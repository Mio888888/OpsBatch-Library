name: 检查计划任务和启动项
command: |
  echo "== current user crontab =="
  crontab -l 2>/dev/null || echo "No readable current-user crontab."

  echo
  echo "== system cron directories =="
  for path in /etc/crontab /etc/cron.d /etc/cron.hourly /etc/cron.daily /etc/cron.weekly /etc/cron.monthly; do
    [ -e "$path" ] && { echo "-- $path --"; ls -la "$path" 2>/dev/null | head -80; } || true
  done

  if [ "$(uname -s)" = "Linux" ]; then
    if command -v systemctl >/dev/null 2>&1; then
      echo
      echo "== enabled systemd units =="
      systemctl list-unit-files --state=enabled 2>/dev/null | head -120 || true
      echo
      echo "== timers =="
      systemctl list-timers --all 2>/dev/null | head -120 || true
    fi
  elif [ "$(uname -s)" = "Darwin" ]; then
    echo
    echo "== launch agents and daemons =="
    for path in /Library/LaunchAgents /Library/LaunchDaemons /System/Library/LaunchAgents /System/Library/LaunchDaemons "$HOME/Library/LaunchAgents"; do
      [ -d "$path" ] && { echo "-- $path --"; ls -la "$path" 2>/dev/null | head -80; } || true
    done
  fi
category: security
tags:
  - audit
  - security
  - cron
  - startup
risk: medium
description: 检查用户/系统计划任务、systemd 定时器或 macOS LaunchAgent/Daemon 启动项。只读查询，可能输出任务命令、路径和用户信息。
platform:
  - linux
  - macos
