name: Protected Group Membership Change
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/protected-group-membership-change_en.sh
category: security
tags:
- remediation
- user
- group
- membership
risk: high
description: Runs the protected protected group membership change workflow for defensive
