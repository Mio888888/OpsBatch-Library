  description: Target user value.
  required: true
  default: null
- name: TARGET_GROUP
  description: Target group value.
  required: true
  default: null
- name: GROUP_ACTION
  description: Group action value.
  required: false
  default: add
- name: CONFIRM_GROUP_CHANGE
  description: Confirm group change value.
  required: false
  default: null
