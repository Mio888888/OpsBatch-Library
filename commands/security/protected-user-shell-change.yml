name: 受保护修改用户 Shell
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/protected-user-shell-change.sh
category: security
tags:
- remediation
- user
- shell
risk: high
description: 受保护的用户登录 Shell 修改模板。默认只展示计划；只有设置 TARGET_USER、TARGET_SHELL 和 CONFIRM_SHELL_CHANGE=CHANGE_TARGET_SHELL
  后才修改。Shell 变更可能阻断登录或服务启动，执行前必须确认影响。
platform:
- linux
- macos
parameters:
- name: TARGET_USER
  description: 目标用户名
  required: true
  default:
- name: TARGET_SHELL
  description: 目标 Shell 路径
  required: true
  default:
- name: CONFIRM_SHELL_CHANGE
  description: 确认修改 Shell 令牌，需设为 CHANGE_SHELL_TARGET_USER 才执行
  required: false
  default:
