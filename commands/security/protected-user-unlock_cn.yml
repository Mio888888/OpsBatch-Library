name: 受保护解锁用户账号
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/protected-user-unlock_cn.sh
category: 安全
tags:
- 修复
- 用户
- 账号
- 解锁
risk: high
description: 受保护的账号解锁模板。默认只展示目标用户；只有设置 TARGET_USER 和 CONFIRM_UNLOCK_USER=UNLOCK_TARGET_USER
  后才解锁。解锁会恢复访问能力，执行前必须确认审批、凭证状态和安全事件结论。
platform:
- linux
- macos
parameters:
- name: TARGET_USER
  description: 目标用户名
  required: true
  default: null
- name: CONFIRM_UNLOCK_USER
  description: 确认解锁令牌，需设为 UNLOCK_TARGET_USER 才执行
  required: false
  default: null
