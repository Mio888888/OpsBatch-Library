name: View Certificate Expiry Summary
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/certificate-expiry-summary_en.sh
category: security
tags:
- inspection
- security
- certificate
- tls
risk: medium
description: Collects diagnostic information for defensive security inspection or
  protected remediation with the view certificate expiry summary workflow. Review
  the output because it may be noisy or expose operational details.
platform:
- linux
- macos
parameters:
- name: CERT_PATH
  description: Cert path value.
  required: true
  default: null
- name: CERT_DIR
  description: Cert dir value.
  required: false
  default: /etc/ssl /etc/pki/tls /etc/letsencrypt/live
- name: LIMIT
  description: Limit value.
  required: false
  default: 80
