name: 生成关键文件完整性基线摘要
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/file-integrity-baseline_cn.sh
category: 安全
tags:
- 审计
- 安全
- 完整性
- 文件
risk: medium
description: 对关键配置文件输出权限元数据和 SHA-256 摘要，辅助建立只读完整性基线。可能输出敏感文件路径和哈希，不读取文件内容正文。
platform:
- linux
- macos
parameters:
- name: FILE_LIST
  description: 要校验的文件路径列表
  required: false
  default: /etc/passwd /etc/group /etc/hosts /etc/sudoers /etc/ssh/sshd_config
