name: 查看安全事件日志时间线
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/security-log-timeline.sh
category: security
tags:
- troubleshooting
- security
- logs
- timeline
risk: medium
description: 按时间线查看认证、防火墙、审计和内核安全相关日志线索。只读查询，可能输出用户名、来源地址、命令和主机名等敏感信息。
platform:
- linux
- macos
parameters:
- name: LINES
  description: 显示行数
  required: false
  default: '160'
- name: SINCE
  description: 起始时间
  required: false
  default: 12 hours ago
- name: SECURITY_LOG_PATTERN
  description: 安全日志搜索模式
  required: false
  default: failed|failure|invalid|denied|sudo|su:|sshd|pam|polkit|segfault|audit|apparmor|selinux|firewall|blocked
