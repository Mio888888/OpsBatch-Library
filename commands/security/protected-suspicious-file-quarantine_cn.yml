name: 受保护隔离可疑文件
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/protected-suspicious-file-quarantine_cn.sh
category: 安全
tags:
- 修复
- 安全
- 文件
- 隔离
risk: high
description: 受保护的可疑文件隔离模板。默认只展示目标元数据和哈希；只有设置 TARGET_FILE、QUARANTINE_DIR 和 CONFIRM_QUARANTINE=MOVE_TARGET_FILE
  后才移动文件。误用可能中断服务或破坏证据链，执行前必须确认影响、取证和回滚方案。
platform:
- linux
- macos
parameters:
- name: TARGET_FILE
  description: 目标文件路径
  required: true
  default: null
- name: QUARANTINE_DIR
  description: 隔离文件存放目录
  required: true
  default: null
- name: CONFIRM_QUARANTINE
  description: 确认隔离文件令牌
  required: false
  default: null
