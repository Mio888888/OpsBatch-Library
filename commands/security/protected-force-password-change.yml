name: 受保护强制下次登录改密
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/protected-force-password-change.sh
category: security
tags:
- remediation
- user
- password
- expire
risk: high
description: 受保护的强制下次登录改密模板。默认只展示计划；只有设置 TARGET_USER 和 CONFIRM_EXPIRE_PASSWORD=EXPIRE_TARGET_PASSWORD
  后才修改密码过期状态。可能阻断非交互账号或服务账号访问，执行前必须确认通知和恢复路径。
platform:
- linux
- macos
parameters:
- name: TARGET_USER
  description: 目标用户名
  required: true
  default: ''
- name: CONFIRM_EXPIRE_PASSWORD
  description: 确认过期密码令牌，需设为 EXPIRE_TARGET_USER 才执行
  required: false
  default: ''
