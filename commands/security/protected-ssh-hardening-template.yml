name: 受保护应用 SSH 安全配置片段
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/protected-ssh-hardening-template.sh
category: security
tags:
- remediation
- security
- ssh
- hardening
risk: high
description: 受保护的 SSH 安全配置示例。默认只展示候选配置并拒绝执行；只有显式设置 SSHD_CONFIG 和 CONFIRM_SSH_HARDEN=APPLY_SSH_HARDENING
  后才追加配置。误用可能导致 SSH 无法登录，执行前必须确认控制台访问、备份、语法校验和回滚方案。
platform:
- linux
- macos
parameters:
- name: SSHD_CONFIG
  description: sshd 配置文件路径
  required: true
  default:
- name: CONFIRM_SSH_HARDEN
  description: 确认 SSH 加固令牌
  required: false
  default:
