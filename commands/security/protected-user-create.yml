name: 受保护创建本地用户
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/protected-user-create.sh
category: security
tags:
- remediation
- user
- account
- create
risk: high
description: 受保护的本地用户创建模板。默认只展示计划；只有显式设置 NEW_USER 和 CONFIRM_CREATE_USER=CREATE_LOCAL_USER
  后才创建账号。创建账号会改变认证边界，执行前必须确认命名、家目录、shell、初始凭证和审批流程。
platform:
- linux
- macos
parameters:
- name: NEW_USER
  description: 新用户名
  required: true
  default: ''
- name: NEW_USER_COMMENT
  description: 新用户注释（GECOS 字段）
  required: false
  default: OpsBatch managed user
- name: NEW_USER_SHELL
  description: 新用户默认 Shell
  required: false
  default: /bin/bash
- name: NEW_USER_HOME
  description: 新用户家目录路径
  required: true
  default: ''
- name: CONFIRM_CREATE_USER
  description: 确认创建令牌，需设为 CREATE_TARGET_USER 才执行
  required: false
  default: ''
- name: NEW_USER_UID
  description: NEW_USER_UID
  required: true
  default: ''
