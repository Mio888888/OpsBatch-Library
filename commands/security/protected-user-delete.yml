name: 受保护删除本地用户
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/protected-user-delete.sh
category: security
tags:
- remediation
- user
- account
- delete
risk: high
description: 受保护的本地用户删除模板。默认只展示目标用户、REMOVE_HOME 计划和当前进程；只有设置 TARGET_USER 和 CONFIRM_DELETE_USER=DELETE_TARGET_USER
  后才删除账号。删除账号可能导致业务中断或数据归属丢失，执行前必须确认备份、文件归属和审批。
platform:
- linux
- macos
parameters:
- name: TARGET_USER
  description: 目标用户名
  required: true
  default:
- name: REMOVE_HOME
  description: 是否删除用户家目录
  required: false
  default: false
- name: CONFIRM_DELETE_USER
  description: 确认删除令牌，需设为 DELETE_TARGET_USER 才执行
  required: false
  default:
