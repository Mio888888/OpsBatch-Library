name: 查看用户组和成员关系
command: |
  TARGET_GROUP="${TARGET_GROUP:-}"

  echo "== groups summary =="
  if [ -n "$TARGET_GROUP" ]; then
    if command -v getent >/dev/null 2>&1; then
      getent group "$TARGET_GROUP" 2>/dev/null || echo "Group not found: $TARGET_GROUP"
    elif [ -r /etc/group ]; then
      awk -F: -v group="$TARGET_GROUP" '$1 == group {print}' /etc/group
    elif [ "$(uname -s)" = "Darwin" ] && command -v dscl >/dev/null 2>&1; then
      dscl . -read "/Groups/$TARGET_GROUP" 2>/dev/null || echo "Group not found: $TARGET_GROUP"
    fi
  else
    if [ -r /etc/group ]; then
      awk -F: '{printf "%-24s gid=%-6s members=%s\n", $1, $3, $4}' /etc/group | sort -k2,2n
    elif [ "$(uname -s)" = "Darwin" ] && command -v dscl >/dev/null 2>&1; then
      dscl . -list /Groups PrimaryGroupID 2>/dev/null | sort -k2,2n || true
    else
      echo "No supported group source found."
    fi
  fi
category: security
tags:
- inspection
- user
- group
risk: low
description: 查看本地用户组和成员关系。默认列出所有组；可通过 TARGET_GROUP 查看指定组详情。
platform:
- linux
- macos
parameters:
- name: TARGET_GROUP
  description: 目标用户组名
  required: true
  default: ""
