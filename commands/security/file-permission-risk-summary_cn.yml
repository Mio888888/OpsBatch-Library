name: 查看文件权限风险摘要
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/file-permission-risk-summary_cn.sh
category: 安全
tags:
- 审计
- 安全
- 文件
- 权限
risk: medium
description: 查找指定文件系统范围内的全局可写目录、setuid/setgid 文件和敏感配置权限线索。只读查询，但可能较耗时并输出敏感路径；默认限定同一文件系统和深度。
platform:
- linux
- macos
parameters:
- name: SCAN_ROOT
  description: 扫描根目录
  required: false
  default: /
- name: MAX_DEPTH
  description: 最大递归深度
  required: false
  default: 3
- name: LIMIT
  description: 显示数量上限
  required: false
  default: 100
