name: 检查 SSH 授权密钥
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/ssh-authorized-keys-audit.sh
category: security
tags:
- audit
- user
- ssh
- authorized-keys
risk: medium
description: 检查用户 SSH authorized_keys 文件、权限和密钥摘要。只读查询，可能输出公钥指纹材料、用户和家目录路径；可通过 TARGET_USER
  限定用户。
platform:
- linux
- macos
parameters:
- name: TARGET_USER
  description: 目标用户名
  required: true
  default:
- name: MAX_KEYS
  description: 最大密钥数量告警阈值
  required: false
  default: 20
