name: 受保护锁定用户账号
command: |
  TARGET_USER="${TARGET_USER:-}"
  CONFIRM_LOCK_USER="${CONFIRM_LOCK_USER:-}"

  if [ -z "$TARGET_USER" ]; then
    echo "Refusing to run: set TARGET_USER explicitly."
    exit 0
  fi

  if ! id "$TARGET_USER" >/dev/null 2>&1; then
    echo "Refusing to run: user not found: $TARGET_USER"
    exit 0
  fi

  echo "== planned account lock =="
  id "$TARGET_USER" 2>/dev/null || true
  ps -u "$TARGET_USER" -o pid,stat,etime,command 2>/dev/null | head -20 || true

  if [ "$CONFIRM_LOCK_USER" != "LOCK_TARGET_USER" ]; then
    echo "Dry-run only. Set CONFIRM_LOCK_USER=LOCK_TARGET_USER after confirming active sessions, service accounts and rollback path."
    exit 0
  fi

  if [ "$(uname -s)" = "Linux" ]; then
    sudo passwd -l "$TARGET_USER"
  elif [ "$(uname -s)" = "Darwin" ] && command -v pwpolicy >/dev/null 2>&1; then
    sudo pwpolicy -u "$TARGET_USER" -setpolicy isDisabled=1
  else
    echo "No supported account lock tool found."
  fi
category: security
tags:
  - remediation
  - user
  - account
  - lock
risk: high
description: 受保护的账号锁定模板。默认只展示目标用户和当前进程；只有设置 TARGET_USER 和 CONFIRM_LOCK_USER=LOCK_TARGET_USER 后才锁定。锁定账号可能中断登录、服务或自动任务，执行前必须确认影响和回滚方案。
platform:
  - linux
  - macos
