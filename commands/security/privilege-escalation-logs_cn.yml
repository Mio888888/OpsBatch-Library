name: 查看 sudo 和权限提升日志
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/privilege-escalation-logs_cn.sh
category: security
tags:
- user
- sudo
- security
- privilege
risk: medium
description: 查看 sudo、su、polkit、pkexec 等权限提升相关日志。只读查询，可能输出用户名、执行命令、TTY、来源地址等敏感信息。
platform:
- linux
- macos
parameters:
- name: LINES
  description: 显示行数
  required: false
  default: 120
- name: PRIVILEGE_PATTERN
  description: 权限提升搜索模式
  required: false
  default: sudo|su:|polkit|pkexec|authentication failure|session opened|session closed|COMMAND=
