name: View Process Environment Summary
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/security/process-environment-summary_en.sh
category: security
tags:
- troubleshooting
- process
- environment
risk: medium
description: Collects diagnostic information for defensive security inspection or
  protected remediation with the view process environment summary workflow. Review
  the output because it may be noisy or expose operational details.
platform:
- linux
- macos
parameters:
- name: PID
  description: Process ID.
  required: false
  default: 1
- name: PROCESS_LIMIT
  description: Process limit value.
  required: false
  default: 120
