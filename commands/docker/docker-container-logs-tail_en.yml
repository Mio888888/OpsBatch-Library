name: View Docker Container Logs
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/docker/docker-container-logs-tail_en.sh
category: docker
tags:
- troubleshooting
- docker
- container
- log
risk: medium
description: Shows recent logs for a specific Docker container. CONTAINER_NAME is required, with a default window of the last 2 hours and 120 lines; container logs may contain sensitive application data.
platform:
- linux
- macos
parameters:
- name: CONTAINER_NAME
  description: Container name or ID.
  required: true
  default: null
- name: LINES
  description: Number of lines to display.
  required: false
  default: 120
- name: SINCE
  description: Start time or time window.
  required: false
  default: 2h
