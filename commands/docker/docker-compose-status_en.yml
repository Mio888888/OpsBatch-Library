name: View Docker Compose Status
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/docker/docker-compose-status_en.sh
category: docker
tags:
- inspection
- docker
- compose
- service
risk: low
description: Shows service status, images, and config validation summary for the Compose project in the current directory or COMPOSE_FILE. Read-only; does not start or stop services.
platform:
- linux
- macos
parameters:
- name: COMPOSE_FILE
  description: Compose file path.
  required: false
  default: null
