name: 查看 Docker 容器日志
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/docker/docker-container-logs-tail_cn.sh
category: Docker
tags:
- 故障排查
- Docker
- 容器
- 日志
risk: medium
description: 查看指定 Docker 容器的近期日志。必须设置 CONTAINER_NAME，默认限制最近 2 小时和 120 行；容器日志可能包含敏感业务数据。
platform:
- linux
- macos
parameters:
- name: CONTAINER_NAME
  description: 容器名称或 ID
  required: true
  default: null
- name: LINES
  description: 显示行数
  required: false
  default: 120
- name: SINCE
  description: 起始时间或时间窗口
  required: false
  default: 2h
