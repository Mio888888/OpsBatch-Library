name: 查看进程崩溃日志线索
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/process/process-crash-log-hints.sh
category: process
tags:
- troubleshooting
- process
- crash
- logs
risk: medium
description: 查看进程崩溃、core dump、OOM、hung task 等系统日志线索。命令只读，但日志输出可能较多且可能包含进程名、路径和业务上下文。
platform:
- linux
- macos
parameters:
- name: PID
  description: 目标进程 ID
  required: true
  default: ''
- name: PROCESS_PATTERN
  description: 进程名或命令行匹配模式
  required: true
  default: ''
