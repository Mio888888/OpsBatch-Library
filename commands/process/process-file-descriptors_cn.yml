name: 查看进程文件描述符
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/process/process-file-descriptors_cn.sh
category: process
tags:
- troubleshooting
- process
- fd
risk: medium
description: 查看指定进程的文件描述符数量和目标。命令只读，但可能输出文件路径、socket、pipe 等敏感运行时信息。
platform:
- linux
- macos
parameters:
- name: PID
  description: 目标进程 ID
  required: false
  default: 1
- name: PROCESS_LIMIT
  description: 显示进程数量上限
  required: false
  default: 80
