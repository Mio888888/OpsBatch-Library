name: 排查 OOM Killer 日志
command: |
  if [ "$(uname -s)" = "Linux" ]; then
    pattern='out of memory|oom-killer|oom_kill|killed process|memory allocation failure'

    if command -v journalctl >/dev/null 2>&1; then
      echo "== journalctl -k OOM entries =="
      journalctl -k --no-pager -n 2000 2>/dev/null | grep -Ei "$pattern" || echo "No OOM entries found in recent kernel journal."
    else
      echo "journalctl not installed."
    fi

    echo
    echo "== dmesg OOM entries =="
    if command -v dmesg >/dev/null 2>&1; then
      dmesg -T 2>/dev/null | grep -Ei "$pattern" || dmesg 2>/dev/null | grep -Ei "$pattern" || echo "No OOM entries found in dmesg or dmesg is restricted."
    else
      echo "dmesg command not installed."
    fi
  else
    echo "OOM Killer log inspection in this command relies on Linux kernel logs."
  fi
category: memory
tags:
  - troubleshooting
  - memory
  - oom
  - log
risk: low
description: 从 Linux kernel journal 和 dmesg 中搜索 OOM Killer 相关日志。只读查询，可能受系统日志权限限制。
platform:
  - linux
