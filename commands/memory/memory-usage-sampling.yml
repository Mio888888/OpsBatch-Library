name: 持续采样内存使用
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/memory/memory-usage-sampling.sh
category: memory
tags:
- inspection
- memory
- sampling
- trend
risk: medium
description: 按固定间隔持续采样内存使用情况，默认 5 次、间隔 2 秒。命令只读，但包含循环和 sleep，可能产生少量额外输出。
platform:
- linux
- macos
parameters:
- name: SAMPLES
  description: 采样次数
  required: false
  default: 5
- name: INTERVAL
  description: 采样间隔（秒）
  required: false
  default: 2
