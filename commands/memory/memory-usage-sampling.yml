name: 持续采样内存使用
command: |
  samples="${SAMPLES:-5}"
  interval="${INTERVAL:-2}"
  echo "Sampling memory usage: SAMPLES=$samples INTERVAL=${interval}s. Override with SAMPLES=<n> INTERVAL=<seconds>."

  if [ "$(uname -s)" = "Linux" ]; then
    i=1
    while [ "$i" -le "$samples" ]; do
      echo "== sample $i $(date '+%Y-%m-%d %H:%M:%S') =="
      if command -v free >/dev/null 2>&1; then
        free -h
      elif [ -r /proc/meminfo ]; then
        grep -E '^(MemTotal|MemFree|MemAvailable|Buffers|Cached|SwapTotal|SwapFree):' /proc/meminfo || true
      else
        echo "No supported Linux memory source found."
      fi
      [ "$i" -lt "$samples" ] && sleep "$interval"
      i=$((i + 1))
    done
  elif [ "$(uname -s)" = "Darwin" ]; then
    i=1
    while [ "$i" -le "$samples" ]; do
      echo "== sample $i $(date '+%Y-%m-%d %H:%M:%S') =="
      if command -v vm_stat >/dev/null 2>&1; then
        vm_stat
      else
        echo "vm_stat not available."
      fi
      [ "$i" -lt "$samples" ] && sleep "$interval"
      i=$((i + 1))
    done
  else
    echo "No supported memory sampling command found."
  fi
category: memory
tags:
- inspection
- memory
- sampling
- trend
risk: medium
description: 按固定间隔持续采样内存使用情况，默认 5 次、间隔 2 秒。命令只读，但包含循环和 sleep，可能产生少量额外输出。
platform:
- linux
- macos
parameters:
- name: SAMPLES
  description: 采样次数
  required: false
  default: "5"
- name: INTERVAL
  description: 采样间隔（秒）
  required: false
  default: "2"
