name: 查找高内存进程
command: |
  if [ "$(uname -s)" = "Darwin" ]; then
    ps -axo pid,ppid,user,comm,%mem,rss,vsz,etime | {
      IFS= read -r header
      printf '%s\n' "$header"
      sort -nrk 5 | head -10
    }
  elif ps -eo pid,ppid,user,comm,%mem,rss,vsz,etime --sort=-%mem >/dev/null 2>&1; then
    ps -eo pid,ppid,user,comm,%mem,rss,vsz,etime --sort=-%mem | head -11
  else
    ps aux | sort -nrk 4 | head -10
  fi
category: memory
tags:
  - troubleshooting
  - memory
  - process
  - top
risk: low
description: 按内存使用率排序展示进程，用于快速定位高 RSS/VSS 或高占用进程来源。
platform:
  - linux
  - macos
