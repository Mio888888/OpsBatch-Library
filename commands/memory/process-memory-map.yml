name: 查看进程内存映射
command: |
  if [ "$(uname -s)" = "Linux" ]; then
    pid="${PID:-1}"
    echo "Inspecting PID=$pid. Override with PID=<pid> if needed."

    if command -v pmap >/dev/null 2>&1; then
      pmap -x "$pid"
    elif [ -r "/proc/$pid/maps" ]; then
      echo "pmap not installed; showing first 50 lines of /proc/$pid/maps."
      head -50 "/proc/$pid/maps"
    else
      echo "No readable memory map found for PID $pid."
    fi
  else
    echo "Process memory maps in this command rely on Linux /proc or pmap output."
  fi
category: memory
tags:
  - troubleshooting
  - memory
  - process
  - map
risk: low
description: 查看 Linux 进程内存映射和地址空间摘要。默认检查 PID 1，可通过环境变量 PID 指定目标进程。
platform:
  - linux
