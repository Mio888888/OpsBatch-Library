name: 受保护升级软件包
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/package-management/protected-package-upgrade.sh
category: package-management
tags:
- remediation
- package-management
- upgrade
- protected
risk: high
description: 受保护的软件包升级模板。默认只输出升级计划；只有显式设置 TARGET_PACKAGE（全量升级需写 all）和 CONFIRM_UPGRADE=UPGRADE_PACKAGE
  后才执行真实升级。升级会联网并改变系统软件状态，可能触发服务重启、兼容性问题或不可逆依赖变更，执行前必须确认变更窗口、备份和回滚方案。
platform:
- linux
- macos
parameters:
- name: PACKAGE_MANAGER
  description: 包管理器（apt/yum/dnf/pacman/auto）
  required: false
  default: auto
- name: TARGET_PACKAGE
  description: 目标软件包名
  required: true
  default:
- name: CONFIRM_UPGRADE
  description: 确认升级令牌
  required: false
  default:
