name: 受保护卸载软件包
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/package-management/protected-package-uninstall.sh
category: package-management
tags:
- remediation
- package-management
- uninstall
- protected
risk: high
description: 受保护的软件包卸载模板。默认只输出卸载影响预览；只有显式设置 TARGET_PACKAGE 和 CONFIRM_UNINSTALL=UNINSTALL_PACKAGE
  后才执行真实卸载。卸载可能删除关键运行时或破坏依赖链，执行前必须确认服务影响、备份和回滚方案。
platform:
- linux
- macos
parameters:
- name: PACKAGE_MANAGER
  description: 包管理器（apt/yum/dnf/pacman/auto）
  required: false
  default: auto
- name: TARGET_PACKAGE
  description: 目标软件包名
  required: true
  default: ''
- name: CONFIRM_UNINSTALL
  description: 确认卸载令牌
  required: false
  default: ''
