name: View User Owned Files
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/user/user-owned-files_en.sh
category: user
tags:
- troubleshooting
- user
- files
- ownership
risk: medium
description: Collects diagnostic information for user account inspection with the
  view user owned files workflow. Review the output because it may be noisy or expose
  operational details.
platform:
- linux
- macos
parameters:
- name: TARGET_USER
  description: Target user value.
  required: true
  default: null
- name: TARGET_DIR
  description: Target dir value.
  required: true
  default: null
- name: MAX_DEPTH
  description: Max depth value.
  required: false
  default: 4
- name: LINES
  description: Number of lines to display.
  required: false
  default: 100
