name: 查看指定用户进程
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/user/user-processes.sh
category: user
tags:
- troubleshooting
- user
- process
risk: low
description: 查看指定用户运行中的进程摘要和资源占用排行。默认查看当前用户，可通过 TARGET_USER 指定。
platform:
- linux
- macos
parameters:
- name: TARGET_USER
  description: 目标用户名
  required: false
  default: $(whoami 2>/dev/null || true)
