name: 检查目标网络连通性
command: |
  TARGET_HOST="${TARGET_HOST:-example.com}"
  TARGET_URL="${TARGET_URL:-https://example.com}"

  echo "== target =="
  echo "TARGET_HOST=$TARGET_HOST"
  echo "TARGET_URL=$TARGET_URL"

  echo
  echo "== ping =="
  ping -c 4 "$TARGET_HOST" 2>/dev/null || echo "Ping failed or ICMP is blocked."

  if command -v curl >/dev/null 2>&1; then
    echo
    echo "== HTTP(S) reachability =="
    curl -I --max-time 10 "$TARGET_URL" 2>/dev/null || echo "curl failed or target is not HTTP(S)."
  fi
category: network
tags:
- troubleshooting
- network
- connectivity
- http
risk: medium
description: 对单个目标执行基础连通性检查，包括 ICMP ping 和可选 HTTP(S) HEAD 请求。默认目标为 example.com，可通过 TARGET_HOST/TARGET_URL 覆盖；仅做少量请求，不做批量探测。
platform:
- linux
- macos
parameters:
- name: TARGET_HOST
  description: 目标主机地址
  required: false
  default: example.com
- name: TARGET_URL
  description: 目标 URL 地址
  required: false
  default: https://example.com
