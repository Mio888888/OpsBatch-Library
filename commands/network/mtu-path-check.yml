name: 检查路径 MTU 线索
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/network/mtu-path-check.sh
category: network
tags:
- troubleshooting
- network
- mtu
- path
risk: medium
description: 对单个目标进行路径 MTU 线索检查。默认目标为 example.com，包大小默认 1472，可通过 TARGET_HOST/PACKET_SIZE
  覆盖；仅发送少量 ICMP 探测，不做压力测试。
platform:
- linux
- macos
parameters:
- name: TARGET_HOST
  description: 目标主机地址
  required: false
  default: example.com
- name: PACKET_SIZE
  description: 探测包大小（字节）
  required: false
  default: 1472
