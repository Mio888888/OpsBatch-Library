name: 跟踪到目标的网络路径
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/network/traceroute-path.sh
category: network
tags:
- troubleshooting
- network
- traceroute
- path
risk: medium
description: 跟踪到单个目标的网络路径，用于定位跨网段或公网链路异常。默认目标为 example.com，可通过 TARGET_HOST/MAX_HOPS
  覆盖；会向目标路径发送少量探测包，不做批量探测。
platform:
- linux
- macos
parameters:
- name: TARGET_HOST
  description: 目标主机地址
  required: false
  default: example.com
- name: MAX_HOPS
  description: 最大路由跳数
  required: false
  default: '20'
