name: 检查 DNS 解析
url: https://raw.githubusercontent.com/Mio888888/OpsBatch-Library/main/commands/network/dns-resolution-check.sh
category: network
tags:
- troubleshooting
- network
- dns
- resolution
risk: medium
description: 对单个目标域名执行 DNS 解析检查。默认目标为 example.com，可通过 TARGET_HOST 覆盖；命令会向配置的解析器发起少量查询，不做批量扫描。
platform:
- linux
- macos
parameters:
- name: TARGET_HOST
  description: 目标主机地址
  required: false
  default: example.com
