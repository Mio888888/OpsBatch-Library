name: "Volume Disk Usage"
category: volumes
tags:
- "volume"
- "inspection"
- "disk"
risk: low
description: "Report per-volume disk usage for persistent storage capacity planning and cleanup decisions."
platform:
- linux
- macos
command: |-
  docker system df -v --format '{{range .Volumes}}{{.Name}}\t{{.Size}}\n{{end}}'
parameters: []
