name: "Remove Volume"
category: "volumes"
tags:
- "volume"
- "mutation"
risk: high
description: "Remove a volume. Dry-run by default. Without CONFIRM_REMOVE=REMOVE_VOLUME the volume is only shown, not removed. Removing a volume permanently destroys its data and is irreversible."
platform:
- linux
- macos
command: |-
  docker volume rm ${VOLUME}
parameters:
  - name: "VOLUME"
    description: "Target volume name"
    required: true
    default: ""
  - name: "CONFIRM_REMOVE"
    description: "Confirm token; must be REMOVE_VOLUME to execute"
    required: true
    default: ""
