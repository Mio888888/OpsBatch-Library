name: "Show Container Restart Policy"
category: "resources"
tags:
- "resource"
- "inspection"
- "ha"
risk: low
description: "Output container restart policy and max retry count for high-availability configuration inspection."
platform:
- linux
- macos
command: |-
  docker inspect ${CONTAINER} --format '{{.HostConfig.RestartPolicy.Name}} retries={{.HostConfig.RestartPolicy.MaximumRetryCount}}'
parameters:
  - name: "CONTAINER"
    description: "Target container name or ID"
    required: true
    default: ""
