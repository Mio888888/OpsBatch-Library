name: "镜像体积排行"
category: 镜像
tags:
- "镜像"
- "巡检"
- "磁盘"
risk: low
description: "按镜像体积降序排列本地镜像，快速定位占用磁盘空间最大的镜像。"
platform:
- linux
- macos
command: |-
  docker images --format '{{.Size}}\t{{.Repository}}:{{.Tag}}' | sort -rh | head -n ${LIMIT}
parameters:
  - name: "LIMIT"
    description: "显示数量上限"
    required: false
    default: "10"
