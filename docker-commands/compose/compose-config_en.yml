name: "Validate Compose Config"
category: "docker"
tags:
- "compose"
- "inspection"
risk: low
description: "Parse and output the effective Compose configuration (with env interpolation) for validating orchestration definitions."
platform:
- linux
- macos
command: |-
  docker compose -f ${COMPOSE_FILE} config
parameters:
  - name: "COMPOSE_FILE"
    description: "Compose file path"
    required: false
    default: "docker-compose.yml"
