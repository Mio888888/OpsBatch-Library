name: "Show Container Port Mapping"
category: "containers"
tags:
- "container"
- "network"
- "inspection"
risk: low
description: "List container-to-host port mappings to inspect exposed ports and connectivity issues."
platform:
- linux
- macos
command: |-
  docker port ${CONTAINER}
parameters:
  - name: "CONTAINER"
    description: "Target container name or ID"
    required: true
    default: ""
