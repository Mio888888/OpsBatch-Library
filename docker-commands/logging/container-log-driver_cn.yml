name: "查看容器日志驱动"
category: "Docker"
tags:
- "日志"
- "巡检"
- "容器"
risk: low
description: "输出容器日志驱动与配置（如 json-file 大小/数量限制），用于日志策略巡检。"
platform:
- linux
- macos
command: |-
  docker inspect ${CONTAINER} --format '{{.HostConfig.LogConfig.Type}} {{.HostConfig.LogConfig.Config}}'
parameters:
  - name: "CONTAINER"
    description: "目标容器名称或 ID"
    required: true
    default: ""
