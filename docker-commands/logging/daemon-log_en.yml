name: "Show Docker Daemon Log"
category: logging
tags:
- "log"
- "inspection"
- "daemon"
risk: low
description: "Show recent Docker daemon systemd journal logs for daemon troubleshooting."
platform:
- linux
- macos
command: |-
  journalctl -u docker.service -n ${LINES} --no-pager
parameters:
  - name: "LINES"
    description: "Number of lines to show"
    required: false
    default: "100"
