name: "Show Container Log Driver"
category: logging
tags:
- "log"
- "inspection"
- "container"
risk: low
description: "Output container log driver and configuration (e.g. json-file size/count limits) for logging policy inspection."
platform:
- linux
- macos
command: |-
  docker inspect ${CONTAINER} --format '{{.HostConfig.LogConfig.Type}} {{.HostConfig.LogConfig.Config}}'
parameters:
  - name: "CONTAINER"
    description: "Target container name or ID"
    required: true
    default: ""
