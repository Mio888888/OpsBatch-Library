name: "Show Container Capabilities"
category: "security"
tags:
- "security"
- "inspection"
- "permission"
risk: low
description: "Output granted Linux capabilities of a container for permission tightening and least-privilege audit."
platform:
- linux
- macos
command: |-
  docker inspect ${CONTAINER} --format '{{.HostConfig.CapAdd}}'
parameters:
  - name: "CONTAINER"
    description: "Target container name or ID"
    required: true
    default: ""
